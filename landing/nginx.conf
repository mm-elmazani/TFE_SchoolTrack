server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /privacy {
        try_files /privacy.html =404;
    }

    # Assets statiques (CSS, JS) — cache long
    location ~* \.(css|js)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
