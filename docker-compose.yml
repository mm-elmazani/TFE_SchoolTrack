services:
  # ---------- Reverse proxy TLS (US 6.3) ----------
  traefik:
    image: traefik:v3.3
    container_name: schooltrack_traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Redirection HTTP -> HTTPS
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # TLS -- Let's Encrypt (production)
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@schooltrack.be}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # TLS 1.3 minimum (US 6.3)
      - "--entrypoints.websecure.http.tls.options=tlsv13only"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"    # Dashboard Traefik (dev uniquement)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_data:/letsencrypt
      - ./traefik-tls.yml:/etc/traefik/dynamic/tls.yml:ro
    restart: unless-stopped

  # ---------- API FastAPI ----------
  api:
    build: ./backend
    container_name: schooltrack_api
    environment:
      TZ: Europe/Brussels
      DATABASE_URL: postgresql://${POSTGRES_USER:-schooltrack}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-schooltrack}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-change-in-production!}
    volumes:
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${API_DOMAIN:-localhost}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    restart: unless-stopped

  # ---------- Base de donnees ----------
  postgres:
    image: postgres:16-alpine
    container_name: schooltrack_db
    command: -c timezone=Europe/Brussels
    environment:
      TZ: Europe/Brussels
      POSTGRES_DB: ${POSTGRES_DB:-schooltrack}
      POSTGRES_USER: ${POSTGRES_USER:-schooltrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-schooltrack}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------- pgAdmin ----------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: schooltrack_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@schooltrack.be}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.${API_DOMAIN:-localhost}`)"
      - "traefik.http.routers.pgadmin.entrypoints=websecure"
      - "traefik.http.routers.pgadmin.tls=true"
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:
  letsencrypt_data:
  media_data:
