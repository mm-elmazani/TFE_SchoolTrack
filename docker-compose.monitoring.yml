# ============================================================================
# Docker Compose MONITORING — SchoolTrack (Loki + Promtail + Grafana)
# Usage : docker compose -f docker-compose.monitoring.yml --env-file .env.prod up -d
# ============================================================================

services:
  # ---------- Loki (stockage logs) ----------
  loki:
    image: grafana/loki:3.4.2
    container_name: schooltrack_loki
    volumes:
      - loki_data:/loki
      - ./loki-config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - schooltrack_net
    restart: always

  # ---------- Promtail (collecte logs Docker) ----------
  promtail:
    image: grafana/promtail:3.4.2
    container_name: schooltrack_promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - schooltrack_net
    restart: always

  # ---------- Grafana (visualisation) ----------
  grafana:
    image: grafana/grafana:11.6.0
    container_name: schooltrack_grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=schooltrack_net"
      - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    depends_on:
      - loki
    networks:
      - schooltrack_net
    restart: always

volumes:
  loki_data:
  grafana_data:

networks:
  schooltrack_net:
    external: true
