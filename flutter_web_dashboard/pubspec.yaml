name: flutter_web_dashboard
description: "SchoolTrack — Dashboard web pour la direction (gestion voyages, élèves, classes)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Appels API REST
  http: ^1.2.1

  # Sélecteur de fichier (compatible web)
  file_picker: ^10.3.10

  # Drag & Drop (compatible web Chrome/Edge)
  desktop_drop: ^0.7.0

  # Routing entre écrans
  go_router: ^17.1.0

  # Persistance token auth (localStorage sur web)
  shared_preferences: ^2.3.4

  # Graphiques dashboard (US 4.2)
  fl_chart: ^0.70.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
