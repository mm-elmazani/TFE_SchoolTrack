name: Deploy

# Déclenché automatiquement quand le workflow CI se termine avec succès sur main
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to VPS (Production)
    runs-on: ubuntu-latest

    # Ne déployer que si tous les tests CI sont verts
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            cd /opt/schooltrack

            # Récupérer les derniers changements
            sudo git pull origin main

            # Rebuild uniquement les services applicatifs
            # postgres et traefik sont exclus : pas de code à rebuilder, postgres contient les données
            docker compose -f docker-compose.prod.yml --env-file .env.prod \
              up --build -d api dashboard landing

            # Nettoyer les images obsolètes pour libérer de l'espace disque
            docker image prune -f

            echo "Deploiement termine avec succes"
