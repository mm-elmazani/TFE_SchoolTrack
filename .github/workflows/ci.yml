name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ----------------------------------------------------------------
  # Job 1 — Tests Python (pytest)
  # La DB est mockée dans conftest.py — pas de service PostgreSQL requis
  # ----------------------------------------------------------------
  pytest:
    name: Tests backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer pytest + vérification couverture 80%
        env:
          MEDIA_DIR: /tmp/schooltrack-media
        run: pytest --cov=app --cov-fail-under=80

  # ----------------------------------------------------------------
  # Job 2 — Tests React (vitest)
  # ----------------------------------------------------------------
  vitest:
    name: Tests frontend (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react_dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: react_dashboard/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Lancer vitest
        run: npm test

  # ----------------------------------------------------------------
  # Job 3 — Tests Flutter (unitaires uniquement — hors intégration)
  # Les tests d'intégration nécessitent un émulateur Android
  # ----------------------------------------------------------------
  flutter-test:
    name: Tests Flutter (unitaires)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_teacher_app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Installer les dépendances Flutter
        run: flutter pub get

      - name: Lancer les tests unitaires
        run: |
          flutter test \
            test/api \
            test/database \
            test/models \
            test/providers \
            test/services \
            test/widget_test.dart
